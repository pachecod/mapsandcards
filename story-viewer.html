<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Story preview</title>
  <script src="/__analytics.js" defer></script>
  <style>
    :root {
      --bg: #0f1419;
      --text: #e8eaed;
      --border: #2a3544;
      --accent: #3d8bfd;
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      min-height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      grid-template-columns: minmax(0, 1fr);
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    .viewer-nav {
      grid-row: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: #1a2332;
    }
    .back-home {
      font-size: 0.85rem;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      background: rgba(15, 20, 25, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--text);
      text-decoration: none;
    }
    .back-home:hover {
      color: #b8c9ff;
      border-color: rgba(255, 255, 255, 0.24);
    }
    .viewer-hint {
      font-size: 0.75rem;
      opacity: 0.75;
    }
    #story-frame {
      grid-row: 2;
      min-height: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      align-self: stretch;
    }
    #viewer-error {
      grid-row: 2;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      color: #f5a623;
      font-size: 0.95rem;
      align-self: stretch;
    }
  </style>
</head>
<body>
  <header class="viewer-nav">
    <a href="/index.html" class="back-home">Home</a>
    <span class="viewer-hint">Navigation is only in this shell; the framed page is publishable by itself.</span>
  </header>
  <iframe id="story-frame" title="Story" hidden></iframe>
  <p id="viewer-error" hidden></p>

  <script>
(function () {
  var frame = document.getElementById("story-frame");
  var err = document.getElementById("viewer-error");
  var q = new URLSearchParams(window.location.search).get("story");
  var slugRe = /^[a-z0-9]+(?:-[a-z0-9]+)*$/;

  if (!q || !slugRe.test(q)) {
    err.textContent =
      "Add a story slug, e.g. ?story=earth — open from Scroll Map Builder home or /story-viewer.html?story=your-story";
    err.hidden = false;
    document.title = "Story preview — error";
    return;
  }

  document.title = q + " — preview";
  frame.title = "Story: " + q;
  frame.src = "/Stories/" + encodeURIComponent(q) + "/scroll-map-story.html";
  frame.hidden = false;
})();
  </script>
</body>
</html>
